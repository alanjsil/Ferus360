<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://lsjoopdtjjadfoqsaasu.supabase.co"
    />
    <title>Conflitos - Finanças</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/conflitos.css" />
    <link rel="stylesheet" href="css/toast.css" />
    <link rel="stylesheet" href="fontawesome/css/all.min.css" />
  </head>
  <body>
    <div class="conflitos-header">
      <h1><i class="fa-solid fa-code-branch"></i> Conflitos de Sincronia</h1>
      <div class="conflitos-header-actions">
        <button type="button" class="btn-primary" id="forceSyncBtn">
          <i class="fa-solid fa-rotate"></i> Forçar Sync
        </button>
        <a href="index.html" class="btn-secondary">
          <i class="fa-solid fa-arrow-left"></i> Voltar
        </a>
      </div>
    </div>

    <main class="conflitos-content" id="conflitosContainer">
      <div class="empty-state" id="emptyState">
        <i class="fa-solid fa-check-circle"></i>
        <p>Nenhum conflito pendente.</p>
      </div>
    </main>

    <dialog id="mergeDialog" class="dialog dialog-wide">
      <div class="dialog-header">
        <h2><i class="fa-solid fa-pen-to-square"></i> Mesclar dados</h2>
        <button type="button" class="btn-close" id="fecharMergeBtn">&times;</button>
      </div>
      <div class="dialog-body">
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 16px">
          Edite os campos abaixo com os valores desejados para o registro mesclado.
        </p>
        <div class="merge-grid" id="mergeForm"></div>
      </div>
      <div class="dialog-footer">
        <button type="button" class="btn-secondary" id="cancelarMergeBtn">Cancelar</button>
        <button type="button" class="btn-primary" id="confirmarMergeBtn">
          <i class="fa-solid fa-check"></i> Confirmar Merge
        </button>
      </div>
    </dialog>

    <script type="module" src="js/conflitos.js"></script>
  </body>
</html>
